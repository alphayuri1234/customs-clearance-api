      security:
      - BearerAuth: []
      summary: Tambah Pelabuhan
      tags:
      - Master Pelabuhan
  /master/ports/{id}:
    delete:
      consumes:
      - application/json
      description: Menghapus data master pelabuhan berdasarkan ID (Khusus Officer)
      parameters:
      - description: Pelabuhan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Pelabuhan Berhasil Dihapus
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: ID Tidak Valid
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Pelabuhan Tidak Ditemukan
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Hapus Pelabuhan
      tags:
      - Master Pelabuhan
    get:
      consumes:
      - application/json
      description: Mengambil satu data master pelabuhan berdasarkan ID (Khusus Officer)
      parameters:
      - description: Pelabuhan ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Pelabuhan Berhasil Diambil
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Port'
              type: object
        "400":
          description: ID Tidak Valid
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Pelabuhan Tidak Ditemukan
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Detail Pelabuhan
      tags:
      - Master Pelabuhan
    put:
      consumes:
      - application/json
      description: Mengubah data master pelabuhan berdasarkan ID (Khusus Officer)
      parameters:
      - description: Pelabuhan ID
        in: path
        name: id
        required: true
        type: integer
      - description: Payload Pelabuhan
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.PortRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Pelabuhan Berhasil Diperbarui
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Port'
              type: object
        "400":
          description: Request atau ID Tidak Valid
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Pelabuhan Tidak Ditemukan
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Perbarui Pelabuhan
      tags:
      - Master Pelabuhan
  /me:
    get:
      consumes:
      - application/json
      description: Mengambil data profil user/officer yang sedang login berdasarkan
        token JWT
      produces:
      - application/json
      responses:
        "200":
          description: Profil Berhasil Diambil
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.User'
              type: object
        "401":
          description: User Belum Terautentikasi
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: User Tidak Ditemukan
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Profil Saya (Me)
      tags:
      - Auth
  /register:
    post:
      consumes:
      - application/json
      description: Membuat akun importir umum (User) atau petugas bea cukai (Officer)
        baru
      parameters:
      - description: Payload Registrasi
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Registrasi Berhasil
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.AuthResponse'
              type: object
        "400":
          description: Request Tidak Valid atau Registrasi Gagal
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Registrasi Akun Baru
      tags:
      - Auth
  /seed:
    post:
      consumes:
      - application/json
      description: Membersihkan seluruh database (TRUNCATE CASCADE) dan mengisi data
        tiruan Bea Cukai dalam jumlah besar untuk keperluan pengetesan
      produces:
      - application/json
      responses:
        "200":
          description: Seeding Berhasil
          schema:
            $ref: '#/definitions/models.APIResponse'
        "500":
          description: Gagal Melakukan Seeding
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Seed Data Tiruan
      tags:
      - Dashboard / Seeder
  /workflow/approve:
    post:
      consumes:
      - application/json
      description: Memberikan persetujuan Bea Cukai pada dokumen clearance (Khusus
        Officer)
      parameters:
      - description: Payload Persetujuan
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ApproveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Clearance Berhasil Disetujui
          schema:
            $ref: '#/definitions/models.APIResponse'
