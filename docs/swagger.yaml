basePath: /api/v1
definitions:
  models.APIResponse:
    properties:
      data: {}
      errors: {}
      message:
        type: string
      success:
        type: boolean
    type: object
  models.ApproveRequest:
    properties:
      clearance_id:
        type: integer
    required:
    - clearance_id
    type: object
  models.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.Clearance:
    properties:
      commodity:
        $ref: '#/definitions/models.Commodity'
      commodity_id:
        type: integer
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      inspection:
        $ref: '#/definitions/models.InspectionResult'
      port:
        $ref: '#/definitions/models.Port'
      port_id:
        type: integer
      release:
        $ref: '#/definitions/models.ReleaseOrder'
      risk_profile:
        $ref: '#/definitions/models.RiskProfile'
      status:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
      valuation:
        type: number
    type: object
  models.Commodity:
    properties:
      created_at:
        type: string
      description:
        type: string
      hs_code:
        type: string
      id:
        type: integer
      import_duty_rate:
        type: number
      updated_at:
        type: string
      vat_rate:
        type: number
    type: object
  models.CommodityRequest:
    properties:
      description:
        type: string
      hs_code:
        maxLength: 20
        type: string
      import_duty_rate:
        minimum: 0
        type: number
      vat_rate:
        minimum: 0
        type: number
    required:
    - description
    - hs_code
    type: object
  models.Country:
    properties:
      code:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.CountryRequest:
    properties:
      code:
        maxLength: 3
        type: string
      name:
        type: string
    required:
    - code
    - name
    type: object
  models.DashboardSummary:
    properties:
      recent_clearances:
        items:
          $ref: '#/definitions/models.Clearance'
        type: array
      risk_counts:
        additionalProperties:
          format: int64
          type: integer
        type: object
      status_counts:
        additionalProperties:
          format: int64
          type: integer
        type: object
      top_commodities:
        items:
          $ref: '#/definitions/models.TopCommodity'
        type: array
      top_ports:
        items:
          $ref: '#/definitions/models.TopPort'
        type: array
      total_clearances:
        type: integer
      total_valuation:
        type: number
    type: object
  models.GateOutRequest:
    properties:
      clearance_id:
        type: integer
    required:
    - clearance_id
    type: object
  models.InspectionRequest:
    properties:
      clearance_id:
        type: integer
      result:
        enum:
        - PASS
        - FAIL
        type: string
    required:
    - clearance_id
    - result
    type: object
  models.InspectionResult:
    properties:
      clearance_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      notes:
        type: string
      officer:
        $ref: '#/definitions/models.Officer'
      officer_id:
        type: integer
      result:
        description: PASS / FAIL
        type: string
      updated_at:
        type: string
    type: object
  models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.Officer:
    properties:
      id:
        type: integer
      nip:
        type: string
      position:
        type: string
      user:
        $ref: '#/definitions/models.User'
      user_id:
        type: integer
    type: object
  models.Port:
    properties:
      code:
        type: string
      country:
        $ref: '#/definitions/models.Country'
      country_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.PortRequest:
    properties:
      code:
        maxLength: 10
        type: string
      country_id:
        type: integer
      name:
        type: string
    required:
    - code
    - country_id
    - name
    type: object
  models.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        enum:
        - User
        - Officer
        type: string
    required:
    - email
    - name
    - password
    type: object
  models.ReleaseOrder:
    properties:
      clearance_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      issued_at:
        type: string
      officer:
        $ref: '#/definitions/models.Officer'
      officer_id:
        type: integer
      release_no:
        type: string
      updated_at:
        type: string
    type: object
  models.ReleaseRequest:
    properties:
      clearance_id:
        type: integer
    required:
    - clearance_id
    type: object
  models.RiskProfile:
    properties:
      clearance_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      level:
        description: HIGH or LOW
        type: string
      reason:
        type: string
      score:
        type: number
      updated_at:
        type: string
    type: object
  models.TopCommodity:
    properties:
      count:
        type: integer
      description:
        type: string
      hs_code:
        type: string
      total_value:
        type: number
    type: object
  models.TopPort:
    properties:
      code:
        type: string
      count:
        type: integer
      name:
        type: string
      total_value:
        type: number
    type: object
  models.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      role:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8082
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API untuk sistem Customs Clearance Bea Cukai (Simulasi Jalur Merah
    & Jalur Hijau).
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Customs Clearance API
  version: "1.0"
paths:
  /dashboard:
    get:
      consumes:
      - application/json
      description: Menampilkan statistik pengajuan barang, kategori risiko, top komoditas,
        top pelabuhan, dan transaksi terbaru (Khusus Officer)
      produces:
      - application/json
      responses:
        "200":
          description: Dashboard Berhasil Diambil
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.DashboardSummary'
              type: object
        "500":
          description: Gagal Mengambil Data
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Ringkasan Dashboard Bea Cukai
      tags:
      - Dashboard / Seeder
  /login:
    post:
      consumes:
      - application/json
      description: Melakukan login untuk mendapatkan token akses JWT
      parameters:
      - description: Payload Login
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login Berhasil
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.AuthResponse'
              type: object
        "400":
          description: Request Tidak Valid
          schema:
            $ref: '#/definitions/models.APIResponse'
        "401":
          description: Kredensial Tidak Valid
          schema:
            $ref: '#/definitions/models.APIResponse'
      summary: Login Akun
      tags:
      - Auth
  /master/commodities:
    get:
      consumes:
      - application/json
      description: Mengambil semua data master komoditas (Khusus Officer)
      produces:
      - application/json
      responses:
        "200":
          description: Komoditas Berhasil Diambil
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Commodity'
                  type: array
              type: object
        "500":
          description: Gagal Mengambil Data
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Daftar Komoditas
      tags:
      - Master Komoditas
    post:
      consumes:
      - application/json
      description: Membuat data master komoditas baru (Khusus Officer)
      parameters:
      - description: Payload Komoditas
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CommodityRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Komoditas Berhasil Dibuat
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Commodity'
              type: object
        "400":
          description: Request Tidak Valid atau Gagal Diproses
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Tambah Komoditas
      tags:
      - Master Komoditas
  /master/commodities/{id}:
    delete:
      consumes:
      - application/json
      description: Menghapus data master komoditas berdasarkan ID (Khusus Officer)
      parameters:
      - description: Komoditas ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Komoditas Berhasil Dihapus
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: ID Tidak Valid
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Komoditas Tidak Ditemukan
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Hapus Komoditas
      tags:
      - Master Komoditas
    get:
      consumes:
      - application/json
      description: Mengambil satu data master komoditas berdasarkan ID (Khusus Officer)
      parameters:
      - description: Komoditas ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Komoditas Berhasil Diambil
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Commodity'
              type: object
        "400":
          description: ID Tidak Valid
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Komoditas Tidak Ditemukan
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Detail Komoditas
      tags:
      - Master Komoditas
    put:
      consumes:
      - application/json
      description: Mengubah data master komoditas berdasarkan ID (Khusus Officer)
      parameters:
      - description: Komoditas ID
        in: path
        name: id
        required: true
        type: integer
      - description: Payload Komoditas
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CommodityRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Komoditas Berhasil Diperbarui
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Commodity'
              type: object
        "400":
          description: Request atau ID Tidak Valid
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Komoditas Tidak Ditemukan
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Perbarui Komoditas
      tags:
      - Master Komoditas
  /master/countries:
    get:
      consumes:
      - application/json
      description: Mengambil semua data master negara (Khusus Officer)
      produces:
      - application/json
      responses:
        "200":
          description: Berhasil mengambil data
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Country'
                  type: array
              type: object
        "500":
          description: Gagal mengambil data
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Daftar Negara
      tags:
      - Master Negara
    post:
      consumes:
      - application/json
      description: Membuat data master negara baru (Khusus Officer)
      parameters:
      - description: Payload Negara
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CountryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Negara Berhasil Dibuat
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Country'
              type: object
        "400":
          description: Request Tidak Valid atau Gagal Diproses
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Tambah Negara
      tags:
      - Master Negara
  /master/countries/{id}:
    delete:
      consumes:
      - application/json
      description: Menghapus data master negara berdasarkan ID (Khusus Officer)
      parameters:
      - description: Negara ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Negara Berhasil Dihapus
          schema:
            $ref: '#/definitions/models.APIResponse'
        "400":
          description: ID Tidak Valid
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Negara Tidak Ditemukan
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Hapus Negara
      tags:
      - Master Negara
    get:
      consumes:
      - application/json
      description: Mengambil satu data master negara berdasarkan ID (Khusus Officer)
      parameters:
      - description: Negara ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Negara Berhasil Diambil
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Country'
              type: object
        "400":
          description: ID Tidak Valid
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Negara Tidak Ditemukan
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Detail Negara
      tags:
      - Master Negara
    put:
      consumes:
      - application/json
      description: Mengubah data master negara berdasarkan ID (Khusus Officer)
      parameters:
      - description: Negara ID
        in: path
        name: id
        required: true
        type: integer
      - description: Payload Negara
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CountryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Negara Berhasil Diperbarui
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Country'
              type: object
        "400":
          description: Request atau ID Tidak Valid
          schema:
            $ref: '#/definitions/models.APIResponse'
        "404":
          description: Negara Tidak Ditemukan
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Perbarui Negara
      tags:
      - Master Negara
  /master/ports:
    get:
      consumes:
      - application/json
      description: Mengambil semua data master pelabuhan (Khusus Officer)
      produces:
      - application/json
      responses:
        "200":
          description: Pelabuhan Berhasil Diambil
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Port'
                  type: array
              type: object
        "500":
          description: Gagal Mengambil Data
          schema:
            $ref: '#/definitions/models.APIResponse'
      security:
      - BearerAuth: []
      summary: Daftar Pelabuhan
      tags:
      - Master Pelabuhan
    post:
      consumes:
      - application/json
      description: Membuat data master pelabuhan baru (Khusus Officer)
      parameters:
      - description: Payload Pelabuhan
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.PortRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Pelabuhan Berhasil Dibuat
          schema:
            allOf:
            - $ref: '#/definitions/models.APIResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.Port'
              type: object
        "400":
